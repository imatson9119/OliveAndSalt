<div
  class="gallery-image"
  [class.gallery-image--small]="size === 'small'"
  [class.gallery-image--medium]="size === 'medium'"
  [class.gallery-image--large]="size === 'large'"
  [class.gallery-image--square]="aspectRatio === 'square'"
  [class.gallery-image--portrait]="aspectRatio === 'portrait'"
  [class.gallery-image--landscape]="aspectRatio === 'landscape'"
  [class.gallery-image--loaded]="imageLoaded"
  [class.gallery-image--error]="imageError"
>
  <!-- Image Container -->
  <div
    class="gallery-image__container"
    (click)="onImageClick()"
    (keydown)="onKeyDown($event)"
    tabindex="0"
    role="button"
    [attr.aria-label]="
      'View larger image: ' +
      (image.alt || image.caption || 'Gallery image ' + (index + 1))
    "
  >
    <!-- Loading Placeholder -->
    <div class="gallery-image__placeholder" *ngIf="!imageLoaded && !imageError">
      <div class="gallery-image__spinner" aria-hidden="true"></div>
    </div>

    <!-- Error State -->
    <div class="gallery-image__error" *ngIf="imageError" aria-hidden="true">
      <svg
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M21 3L3 21M3 3l18 18" />
      </svg>
      <span class="gallery-image__error-text">Image unavailable</span>
    </div>

    <!-- Main Image -->
    <img
      class="gallery-image__img"
      [src]="image.thumbnail || image.src"
      [alt]="image.alt || image.caption || ''"
      [loading]="lazyLoad ? 'lazy' : 'eager'"
      (load)="onImageLoad()"
      (error)="onImageError()"
      *ngIf="!imageError"
    />

    <!-- Overlay on hover -->
    <div class="gallery-image__overlay" aria-hidden="true">
      <div class="gallery-image__zoom-icon">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <path d="M21 21l-4.35-4.35"></path>
          <line x1="9" y1="11" x2="13" y2="11"></line>
          <line x1="11" y1="9" x2="11" y2="13"></line>
        </svg>
      </div>
    </div>
  </div>

  <!-- Caption -->
  <div
    class="gallery-image__caption"
    *ngIf="showCaption && (image.caption || image.alt)"
  >
    <p class="gallery-image__caption-text">
      {{ image.caption || image.alt }}
    </p>
    <div class="gallery-image__metadata" *ngIf="image.category || image.date">
      <span class="gallery-image__category" *ngIf="image.category">{{
        image.category
      }}</span>
      <span class="gallery-image__date" *ngIf="image.date">{{
        image.date | date : "shortDate"
      }}</span>
    </div>
  </div>
</div>
