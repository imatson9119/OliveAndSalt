<!-- Modal backdrop -->
<div
  *ngIf="isModalOpen"
  class="modal-overlay"
  [class.modal-overlay--visible]="isModalOpen"
  (click)="onBackdropClick($event)"
  (keydown.escape)="onClose()"
  tabindex="0"
>
  <!-- Modal dialog -->
  <div
    class="modal"
    [class]="modalClasses"
    role="dialog"
    [attr.aria-modal]="isModalOpen"
    [attr.aria-labelledby]="title ? 'modal-title' : null"
    (click)="$event.stopPropagation()"
    (keydown.enter)="$event.stopPropagation()"
    (keydown.space)="$event.stopPropagation()"
  >
    <!-- Modal header -->
    <div *ngIf="(title || closable) && showHeader" class="modal__header">
      <h2 *ngIf="title" id="modal-title" class="modal__title">
        {{ title }}
      </h2>

      <button
        *ngIf="closable"
        type="button"
        class="modal__close"
        (click)="onClose()"
        (keydown.enter)="onClose()"
        (keydown.space)="onClose()"
        aria-label="Close modal"
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Modal content -->
    <div class="modal__content">
      <ng-content></ng-content>
      <p *ngIf="content" class="modal__text">{{ content }}</p>
    </div>

    <!-- Modal footer -->
    <div *ngIf="hasFooterContent && showFooter" class="modal__footer">
      <ng-content select="[slot=footer]"></ng-content>
    </div>
  </div>
</div>
